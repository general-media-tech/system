function openCollectModal(invId, custName, remaining, alreadyPaid, invNum) {
  document.getElementById('modal-title').textContent = `تحصيل دين — ${custName} (#${invNum})`;
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:14px;">
      <div style="background:var(--danger-bg);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:13px;font-weight:700;color:var(--danger);">المتبقي على العميل</span>
        <span style="font-size:20px;font-weight:900;color:var(--danger);">${remaining.toFixed(2)} $</span>
      </div>
      <div class="form-group">
        <label class="form-label">المبلغ المحصَّل ($)</label>
        <input type="number" class="form-input" id="collect-amount" min="0.01" step="0.01" max="${remaining}"
          placeholder="0.00" style="font-size:18px;font-weight:900;text-align:center;" value="${remaining.toFixed(2)}">
      </div>
      <div id="collect-status-preview" style="margin-top:8px;font-size:12px;font-weight:700;color:var(--text3);text-align:center;"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-success" style="flex:2;" onclick="submitCollection('${invId}',${remaining},${alreadyPaid})">
        💵 تأكيد التحصيل
      </button>
    </div>
  `;
  const amtInput = document.getElementById('collect-amount');
  const preview  = document.getElementById('collect-status-preview');
  const updatePreview = () => {
    const amt = parseFloat(amtInput.value) || 0;
    const newPaid = alreadyPaid + amt;
    const newRem  = Math.max(0, remaining - amt);
    if (amt >= remaining) {
      preview.textContent = '✅ سيتم إغلاق الدين بالكامل';
      preview.style.color = 'var(--success)';
    } else if (amt > 0) {
      preview.textContent = `دفع جزئي — سيبقى: ${newRem.toFixed(2)} $`;
      preview.style.color = 'var(--warning)';
    } else {
      preview.textContent = '';
    }
  };
  amtInput.addEventListener('input', updatePreview);
  updatePreview();
  document.getElementById('modal').style.display = 'flex';
}

async function submitCollection(invId, remaining, alreadyPaid) {
  const amt = parseFloat(document.getElementById('collect-amount')?.value) || 0;
  if (amt <= 0) { showToast('أدخل مبلغاً صحيحاً', 'err'); return; }
  const newPaid   = alreadyPaid + amt;
  const newRem    = Math.max(0, remaining - amt);
  const newStatus = newRem <= 0 ? 'paid' : 'partial';
  try {
    await sb('PATCH', `/rest/v1/invoices?id=eq.${invId}`, {
      paid_amount      : parseFloat(newPaid.toFixed(2)),
      remaining_amount : parseFloat(newRem.toFixed(2)),
      payment_status   : newStatus,
    }, { Prefer: 'return=minimal' });

    // سجّل الدفعة في جدول debt_payments (إن وجد — يتجاهل الخطأ إذا لم يكن موجوداً)
    try {
      await sb('POST', '/rest/v1/debt_payments', {
        invoice_id  : invId,
        amount      : parseFloat(amt.toFixed(2)),
        collected_by: 'admin',
        note        : `تحصيل يدوي — ${new Date().toLocaleDateString('ar-SY')}`,
      });
    } catch(_) {}

    showToast(newStatus === 'paid' ? '✅ تم سداد الدين بالكامل' : `✅ تم تسجيل دفعة ${amt.toFixed(2)}$`, 'ok');
    closeModal();
    await loadDebts();
    renderDebts();
  } catch(e) {
    showToast('خطأ: ' + e.message, 'err');
  }
}

async function loadCustomers() {
  try {
    const rows = await sb('GET', '/rest/v1/gmt_customers?order=created_at.desc&limit=1000&select=*');
    allCustomers = Array.isArray(rows) ? rows : [];
  } catch(e) {
    // الجدول ربما غير موجود بعد - نبني البيانات من الفواتير
    const seen = new Map();
    allInvoices.forEach(inv => {
      if (inv.customer_name && inv.customer_phone) {
        const key = inv.customer_phone.trim();
        if (!seen.has(key)) {
          seen.set(key, {
            id: key,
            name: inv.customer_name,
            phone: inv.customer_phone,
            branch_key: inv.branch_key,
            branch_name: inv.branch_name,
            is_blocked: false,
            created_at: inv.created_at,
          });
        }
      }
    });
    allCustomers = [...seen.values()];
  }
}

    (c.name||'').toLowerCase().includes(q) ||
    (c.phone||'').includes(q)
  );

  if (label) label.textContent = `${list.length} عميل`;
  const container = document.getElementById('cust-list');

  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><div class="ico">👥</div><p>لا يوجد عملاء مسجّلون</p><p style="font-size:11px;margin-top:6px;">العملاء يُسجَّلون تلقائياً عند إنشاء الفواتير</p></div>';

  const totalSpent = (phone) => allInvoices.filter(i => i.customer_phone === phone).reduce((s,i)=>s+(Number(i.total)||0),0);

  container.innerHTML = list.map(cust => {
    const cnt   = invCount(cust.phone);
    const spent = totalSpent(cust.phone);
    const branchInfo = cust.branch_name || branches.find(b=>b.key_name===cust.branch_key)?.display_name || cust.branch_key || '—';
    const isBlocked = cust.is_blocked;
    return `
    <div style="background:${isBlocked?'#fef2f2':'var(--surface)'};border:1.5px solid ${isBlocked?'var(--danger)':'var(--border)'};border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
        <div>
          <div style="font-size:14px;font-weight:900;${isBlocked?'color:var(--danger);':''}">
            ${isBlocked?'🚫 ':''} ${escH(cust.name||'—')}
          </div>
          <div style="font-size:12px;font-weight:700;color:var(--text3);direction:ltr;">${escH(cust.phone||'—')}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">📍 ${escH(branchInfo)}</div>
        </div>
        <div style="text-align:left;">
          <div style="font-size:13px;font-weight:900;color:var(--success);">${spent.toFixed(2)} $</div>

        <button class="btn btn-ghost btn-sm" onclick="viewCustomerInvoices('${escH(cust.phone)}','${escH(cust.name)}')">📋 فواتيره</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleBlockCustomer(custId, block, name) {
  const msg = block ? `حظر العميل "${name}"؟` : `رفع الحظر عن "${name}"؟`;
  if (!confirm(msg)) return;
  try {
    await sb('PATCH', `/rest/v1/gmt_customers?id=eq.${custId}`,
      { is_blocked: block }, { Prefer: 'return=minimal' });

}

          <span>📁 ${escH(g)} (${gProds.length})</span>
          <button onclick="event.stopPropagation();selectGroupProds('${checkClass}','${escH(g)}',true)" style="padding:2px 8px;background:#dbeafe;color:#1d4ed8;border:1.5px solid #93c5fd;border-radius:6px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Cairo',sans-serif;">الكل</button>
        </div>

            <label style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;" data-group="${escH(g)}" data-name="${escH(p.name)}">
              <input type="checkbox" class="${checkClass}" value="${p.id}" data-name="${escH(p.name)}" data-price="${p.price||0}" data-group="${escH(g)}">
              <span style="flex:1;font-size:12px;font-weight:700;">${escH(p.name)}</span>
              <span style="font-size:11px;color:var(--red);font-weight:800;">${Number(p.price||0).toFixed(2)}$</span>
            </label>`).join('')}
        </div>
      </div>`;
    }).join('')}`;
}

function filterProdSelector(containerId, checkClass, q) {
  const labels = document.querySelectorAll(`#${containerId} label[data-name]`);
  q = q.toLowerCase();
  labels.forEach(lbl => {
    const name = (lbl.dataset.name||'').toLowerCase();
    lbl.style.display = (!q || name.includes(q)) ? '' : 'none';
    // إظهار المجموعة إذا فيها نتائج
    if (q) {
      const groupDiv = lbl.closest('[class^="group-prods-"]') || lbl.closest('[class*="group-prods-"]');
      if (groupDiv && !groupDiv.style.display && lbl.style.display !== 'none') groupDiv.style.display = 'block';
    }
  });
}

function toggleGroupProds(containerId, checkClass, group) {
  const safeG = group.replace(/\s/g,'_');
  const div = document.querySelector(`.group-prods-${safeG}`);
  if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
}

function selectGroupProds(checkClass, group, checked) {
  document.querySelectorAll(`.${checkClass}[data-group="${group}"]`).forEach(cb => { cb.checked = checked; });
}

function selectAllProds(checkClass, checked) {
  document.querySelectorAll(`.${checkClass}`).forEach(cb => { cb.checked = checked; });
}

let _offerType = 'single';
function setOfferType(type) {
  _offerType = type;
  document.getElementById('of-type-single').className = type === 'single' ? 'btn btn-red btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('of-type-bundle').className = type === 'bundle' ? 'btn btn-red btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('of-type-single').style.width = '100%';
  document.getElementById('of-type-bundle').style.width = '100%';
  const ps = document.getElementById('of-products-section');
  if (ps) ps.style.display = type === 'bundle' ? 'block' : 'none';

async function saveOffer() {
  const name  = document.getElementById('of-name')?.value.trim();
  const desc  = document.getElementById('of-desc')?.value.trim();
  const img   = document.getElementById('of-img')?.value.trim();
  const reel  = document.getElementById('of-reel')?.value.trim();
  const price = parseFloat(document.getElementById('of-price')?.value || 0);

  if (!name) { showToast('أدخل اسم العرض', 'err'); return; }
  if (!price || price <= 0) { showToast('أدخل سعر العرض', 'err'); return; }

  let products = [];
  if (_offerType === 'bundle') {
    document.querySelectorAll('.of-prod-check:checked').forEach(cb => {
      products.push({ id: cb.value, name: cb.dataset.name, price: parseFloat(cb.dataset.price)||0 });
    });
    if (!products.length) { showToast('اختر منتجاً واحداً على الأقل للباقة', 'err'); return; }
  }

  try {
    await sb('POST', '/rest/v1/gmt_offers', {
      name, description: desc || null, image_url: img || null, reel_url: reel || null,
      offer_price: price, offer_type: _offerType,
      products: products.length ? JSON.stringify(products) : null,
      is_active: true,
    });
    showToast('✅ تم حفظ العرض بنجاح', 'ok');
    closeModal();
    renderOffers();
    // إشعار تيليجرام
    sendTelegram(
`<b>🎁 عرض جديد — GMT Admin</b>
━━━━━━━━━━━━━━━
<b>الاسم:</b> ${name}
<b>السعر:</b> ${price.toFixed(2)} $
<b>النوع:</b> ${_offerType === 'bundle' ? 'باقة' : 'فردي'}
${desc ? `<b>الوصف:</b> ${desc}` : ''}
<b>التوقيت:</b> ${new Date().toLocaleString('ar-SY')}`
    );
  } catch(e) { showToast('خطأ: ' + e.message + ' — تأكد من وجود جدول gmt_offers في Supabase', 'err'); }
}

async function deleteOffer(id) {
  if (!confirm('حذف هذا العرض؟')) return;
  try {
    await sb('DELETE', `/rest/v1/gmt_offers?id=eq.${id}`, null, { Prefer: 'return=minimal' });
    showToast('✅ تم حذف العرض', 'ok');
    renderOffers();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

async function copyOfferText(id) {
  try {
    const rows = await sb('GET', `/rest/v1/gmt_offers?id=eq.${id}&select=*`);
    const offer = rows?.[0];
    if (!offer) return;
    const prods = offer.products ? JSON.parse(offer.products) : [];
    const text = `🎁 ${offer.name}\n\n${offer.description || ''}\n\n💰 سعر العرض: ${Number(offer.offer_price).toFixed(2)} $${prods.length ? '\n\n📦 يشمل: ' + prods.map(p=>p.name).join(' + ') : ''}\n\n📞 للاستفسار والطلب: +963 939773715`;
    navigator.clipboard.writeText(text).then(() => showToast('✅ تم نسخ النص للنشر', 'ok'));
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

let _cpType = 'percent';
function setCpType(type) {
  _cpType = type;
  document.getElementById('cp-type-pct').className = type==='percent' ? 'btn btn-red btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('cp-type-fix').className = type==='fixed'   ? 'btn btn-red btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('cp-type-pct').style.width = '100%';
  document.getElementById('cp-type-fix').style.width = '100%';
  const h = document.getElementById('cp-val-hint');
  if (h) h.textContent = type === 'percent' ? 'مثال: 20 = خصم 20% (الحد الأقصى 100)' : 'مثال: 5 = خصم $5';
  const maxEl = document.getElementById('cp-max')?.parentElement;
  if (maxEl) maxEl.style.display = type === 'percent' ? 'block' : 'none';
}

function generateCouponCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
  const el = document.getElementById('cp-code');
  if (el) el.value = code;
}

async function saveCoupon() {
  const code   = document.getElementById('cp-code')?.value.trim().toUpperCase();
  const cust   = document.getElementById('cp-cust')?.value.trim();
  const val    = parseFloat(document.getElementById('cp-val')?.value || 0);
  const minP   = parseFloat(document.getElementById('cp-min')?.value || 0);
  const maxD   = parseFloat(document.getElementById('cp-max')?.value || 0);
  const exp    = document.getElementById('cp-exp')?.value;

  if (!code) { showToast('أدخل كود الكوبون', 'err'); return; }
  if (!val || val <= 0) { showToast('أدخل قيمة الخصم', 'err'); return; }
  if (_cpType === 'percent' && val > 100) { showToast('نسبة الخصم لا يمكن أن تتجاوز 100%', 'err'); return; }

  const prods = [];
  document.querySelectorAll('.cp-prod-check:checked').forEach(cb => {
    prods.push({ id: cb.value, name: cb.dataset.name });
  });

  try {
    await sb('POST', '/rest/v1/gmt_coupons', {
      code,
      customer_name      : cust || null,
      discount_type      : _cpType,
      discount_value     : val,
      min_purchase       : minP > 0 ? minP : null,
      max_discount       : maxD > 0 ? maxD : null,
      expires_at         : exp ? new Date(exp + 'T23:59:59').toISOString() : null,
      applicable_products: prods.length ? JSON.stringify(prods) : null,
      is_used            : false,
    });
    showToast('✅ تم إنشاء الكوبون: ' + code, 'ok');
    closeModal();
    renderCoupons();
  } catch(e) {
    if (e.message?.includes('duplicate') || e.message?.includes('unique')) {
      showToast('⚠️ هذا الكود موجود مسبقاً — اختر كوداً آخر', 'err');
    } else {
      showToast('خطأ: ' + e.message + ' — تأكد من وجود جدول gmt_coupons في Supabase', 'err');
    }
  }
}

function copyCouponCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast('✅ تم نسخ الكود: ' + code, 'ok'));
}

async function markCouponUsed(id) {
  if (!confirm('تعليم هذا الكوبون كمستخدَم؟')) return;
  try {
    await sb('PATCH', `/rest/v1/gmt_coupons?id=eq.${id}`, { is_used: true, used_at: new Date().toISOString() }, { Prefer: 'return=minimal' });
    showToast('✅ تم تعليم الكوبون كمستخدَم', 'ok');
    renderCoupons();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

async function deleteCoupon(id) {
  if (!confirm('حذف هذا الكوبون؟')) return;
  try {
    await sb('DELETE', `/rest/v1/gmt_coupons?id=eq.${id}`, null, { Prefer: 'return=minimal' });
    showToast('✅ تم حذف الكوبون', 'ok');
    renderCoupons();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

function showOnboarding() {
  if (localStorage.getItem(ONBOARD_KEY)) return;
  let step = 0;
  const overlay = document.createElement('div');
  overlay.id = 'onboard-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;padding:20px;';

  function render() {
    const s = ONBOARD_STEPS[step];
    overlay.innerHTML = `
      <div style="background:white;border-radius:24px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.5);">
        <div style="text-align:center;margin-bottom:18px;">
          <div style="font-size:52px;margin-bottom:10px;">${s.icon}</div>
          <div style="font-size:18px;font-weight:900;color:#111;margin-bottom:8px;">${s.title}</div>
          <div style="font-size:13px;color:#6b7280;font-weight:600;line-height:1.7;">${s.text}</div>
        </div>
        <!-- نقاط التقدم -->
        <div style="display:flex;justify-content:center;gap:6px;margin-bottom:18px;">
          ${ONBOARD_STEPS.map((_,i) => `<div style="width:${i===step?18:7}px;height:7px;border-radius:4px;background:${i===step?'#d5001c':'#e5e7eb'};transition:all 0.3s;"></div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;">
          ${step > 0 ? `<button onclick="onboardPrev()" style="flex:1;background:#f3f4f6;color:#374151;border:none;border-radius:12px;padding:12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;">← السابق</button>` : ''}
          ${step < ONBOARD_STEPS.length-1
            ? `<button onclick="onboardNext()" style="flex:2;background:linear-gradient(135deg,#d42b2b,#ef4444);color:white;border:none;border-radius:12px;padding:12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;">التالي ←</button>`
            : `<button onclick="onboardDone()" style="flex:2;background:linear-gradient(135deg,#16a34a,#22c55e);color:white;border:none;border-radius:12px;padding:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;">✅ ابدأ الاستخدام</button>`}
        </div>
        <div style="text-align:center;margin-top:10px;">
          <button onclick="onboardDone()" style="font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;font-family:'Cairo',sans-serif;">تخطي الشرح</button>
        </div>
      </div>`;
  }

  window.onboardNext = () => { if (step < ONBOARD_STEPS.length-1) { step++; render(); } };
  window.onboardPrev = () => { if (step > 0) { step--; render(); } };
  window.onboardDone = () => {
    localStorage.setItem(ONBOARD_KEY, '1');
    overlay.remove();
  };

  render();
  document.body.appendChild(overlay);
}

// ─── متغيرات الأوردر المرتبط ───
let _linkedOrder = null;


function gmtPromptLinkOrder(invoiceId) {
  const orderId = prompt('أدخل رقم ID الأوردر المراد ربطه بهذه الفاتورة:');
  if (!orderId || !orderId.trim()) return;
  gmtLinkOrderToInvoice(orderId.trim(), invoiceId);
}

// تعديل gmtLinkOrderToInvoice لقبول invoiceId
async function gmtLinkOrderToInvoice(orderId, invoiceId) {
  try {
    const r = await sb('GET', `/rest/v1/gmt_orders?id=eq.${orderId}&select=*`);
    const order = Array.isArray(r) && r.length ? r[0] : null;
    if (!order) {
      // جرب البحث بـ serial_code أو order_number
      const r2 = await sb('GET', `/rest/v1/gmt_orders?order_number=eq.${orderId}&select=*`);
      const o2  = Array.isArray(r2) && r2.length ? r2[0] : null;
      if (!o2) return showToast('لم يُوجد الأوردر: ' + orderId, 'error');
      return gmtLinkOrderToInvoice(o2.id, invoiceId);
    }
    if (order.linked_invoice_id) return showToast(`الأوردر مرتبط مسبقاً بفاتورة أخرى`, 'error');
    if (order.is_locked)         return showToast('هذا الأوردر مقفل', 'error');

    const confirmed = confirm(`ربط فاتورة بأوردر #${order.order_number||order.id}\nالزبون: ${order.customer_name||order.name||'—'}\nالمبلغ: $${parseFloat(order.order_total||order.price||0).toFixed(2)}\n\nهل تريد المتابعة؟`);
    if (!confirmed) return;

    await sb('PATCH', `/rest/v1/gmt_orders?id=eq.${order.id}`, {
      linked_invoice_id: invoiceId,
      status:            'prepared',
      prepared_by:       'أدمن',
      prepared_at:       new Date().toISOString(),
      is_locked:         true
    });

    await sb('PATCH', `/rest/v1/invoices?id=eq.${invoiceId}`, {
      linked_order_id: order.id,
      commission_amount: 0   // الفواتير المرتبطة بأوردر لا عمولة عليها
    });

    showToast(`✅ تم ربط الفاتورة بأوردر #${order.order_number||order.id}`, 'success');
    loadData && loadData();
  } catch(e) {
    showToast('خطأ: ' + e.message, 'error');
  }
}

}

function gmtAdminTransferCard(t) {
  const statusColor = t.status==='received'?'#16a34a':t.status==='cancelled'?'#dc2626':'#d97706';
  const statusLabel = t.status==='received'?'✅ مكتملة':t.status==='cancelled'?'🚫 ملغاة':'🚚 في الطريق';
  const date = t.created_at ? new Date(t.created_at).toLocaleDateString('ar-SY') : '';
  const itemsArr = Array.isArray(t.transfer_items)?t.transfer_items:[];
  const totalQty = itemsArr.reduce((s,i)=>s+i.qty,0);
  const totalCost = itemsArr.reduce((s,i)=>s+(i.unit_cost||0)*i.qty,0);
  const totalSale = itemsArr.reduce((s,i)=>s+(i.sale_price||0)*i.qty,0);
  const profit = totalSale - totalCost;

  return `<div style="border:1.5px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:10px;background:white;box-shadow:0 1px 4px rgba(0,0,0,0.05);">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;">
      <div>
        <div style="font-size:14px;font-weight:900;">#${t.transfer_number}</div>
        <div style="font-size:11px;color:#6b7280;">${date} — ${t.created_by||'—'}</div>
      </div>
      <span style="background:${statusColor}20;color:${statusColor};border-radius:8px;padding:3px 10px;font-size:11px;font-weight:800;">${statusLabel}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:8px;">
      <span style="color:#dc2626;font-weight:800;">📤 ${t.from_branch_name}</span>
      <span style="color:#9ca3af;">→</span>
      <span style="color:#16a34a;font-weight:800;">📥 ${t.to_branch_name}</span>
      <span style="color:#6b7280;margin-right:auto;">${itemsArr.length} منتج · ${totalQty} قطعة</span>
    </div>
    <div style="display:flex;gap:12px;font-size:11px;color:#6b7280;margin-bottom:${t.status==='pending'?'10':'0'}px;">
      <span>تكلفة: <b>$${totalCost.toFixed(2)}</b></span>
      <span>مبيع: <b>$${totalSale.toFixed(2)}</b></span>
      <span style="color:${profit>=0?'#16a34a':'#dc2626'};font-weight:800;">ربح: $${profit.toFixed(2)}</span>
    </div>
    ${t.status==='pending' ? `
      <div style="border-top:1px solid #f3f4f6;padding-top:10px;">
        <label style="font-size:11px;font-weight:800;color:#374151;display:block;margin-bottom:6px;">👤 اسم المستلم</label>
        <div style="display:flex;gap:8px;">
          <input id="recv-name-${t.id}" type="text" placeholder="اكتب اسم المستلم..."
            style="flex:1;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:'Cairo';font-size:12px;">
          <label style="background:#f3f4f6;color:#374151;border:none;padding:8px 12px;border-radius:8px;font-family:'Cairo';font-size:12px;font-weight:700;cursor:pointer;">
            📷 صورة
            <input type="file" accept="image/*" style="display:none;"
              onchange="gmtAdminUploadAndConfirm('${t.id}',this)">
          </label>
          <button onclick="gmtAdminConfirmReceive('${t.id}')"
            style="background:#16a34a;color:white;border:none;padding:8px 14px;border-radius:8px;font-family:'Cairo';font-size:12px;font-weight:800;cursor:pointer;">
            ✅ تأكيد
          </button>
        </div>
      </div>` : t.status==='received' ? `
      <div style="font-size:11px;color:#16a34a;margin-top:6px;">
        ✅ استلم: ${t.received_by||'—'} — ${t.received_at?new Date(t.received_at).toLocaleDateString('ar-SY'):''}
        ${t.signature_url ? `<a href="${t.signature_url}" target="_blank" style="margin-right:8px;color:#1d4ed8;">📷 الصورة</a>` : ''}
      </div>` : ''}
  </div>`;
}

window._gmtAdminSigFiles = {};
function gmtAdminUploadAndConfirm(transferId, input) {
  if (input.files[0]) window._gmtAdminSigFiles[transferId] = input.files[0];
}

async function gmtAdminConfirmReceive(transferId) {
  const receivedBy = document.getElementById('recv-name-'+transferId)?.value?.trim();
  if (!receivedBy) return showToast('أدخل اسم المستلم', 'error');

  showLoading('جارٍ تأكيد الاستلام...');
  try {
    const r = await sb('GET', `/rest/v1/branch_transfers?id=eq.${transferId}&select=*`);
    const transfer = Array.isArray(r)?r[0]:null;
    if (!transfer) { hideLoading(); return showToast('لم يُوجد السجل', 'error'); }

    const items = await sb('GET', `/rest/v1/transfer_items?transfer_id=eq.${transferId}`);

    // رفع صورة
    let signatureUrl = '';
    const sigFile = window._gmtAdminSigFiles?.[transferId];
    if (sigFile) {
      const SB_URL = typeof SUPABASE_URL!=='undefined'?SUPABASE_URL:'';
      const SB_KEY = typeof SUPABASE_KEY!=='undefined'?SUPABASE_KEY:'';
      const fn = `${transferId}_${Date.now()}.jpg`;
      try {
        const up = await fetch(`${SB_URL_up}/storage/v1/object/transfer-signatures/${fn}`, {
          method:'POST', headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':sigFile.type}, body:sigFile
        });
        if (up.ok) signatureUrl = `${SB_URL_up}/storage/v1/object/public/transfer-signatures/${fn}`;
      } catch(_) {}
    }

    // إضافة كميات للمستلم
    const SB_URL2 = (typeof SB_URL !== 'undefined' ? SB_URL : '');
    const SB_KEY2 = (typeof SB_KEY !== 'undefined' ? SB_KEY : '');
    for (const item of (Array.isArray(items)?items:[])) {
      await fetch(`${SB_URL2}/rest/v1/rpc/add_branch_stock`, {
        method:'POST',
        headers:{apikey:SB_URL2 ? SB_KEY2 : SB_KEY,Authorization:'Bearer '+(SB_URL2 ? SB_KEY2 : SB_KEY),'Content-Type':'application/json'},
        body:JSON.stringify({p_product_id:item.product_id,p_branch_key:transfer.to_branch,p_qty:item.qty})
      });
    }

    await sb('PATCH', `/rest/v1/branch_transfers?id=eq.${transferId}`, {
      status:'received', received_at:new Date().toISOString(), received_by:receivedBy,
      ...(signatureUrl?{signature_url:signatureUrl}:{})
    });

    hideLoading();
    showToast('✅ تم تأكيد الاستلام', 'success');
    renderInternalTransfers();
  } catch(err) {
    hideLoading();
    showToast('خطأ: '+err.message, 'error');
  }
}

(function patchSwitchTab() {
  const origSwitchTab = window.switchTab;
  window.switchTab = function(tab) {
    if (tab === 'internal_transfers') {
      // تفعيل التاب
      document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
      document.getElementById('main-tab-internal-transfers')?.classList.add('active');
      document.getElementById('app-content').style.display = 'block';
      renderInternalTransfers();
      return;
    }
    if (origSwitchTab) origSwitchTab(tab);
  };
})();

async function gmtSaveBranchEdit(branchId) {
  const nameEl    = document.getElementById('branch-edit-name');
  const iconEl    = document.getElementById('branch-edit-icon');
  const isBranch  = document.getElementById('branch-is-branch')?.checked ?? true;
  const showTable = document.getElementById('branch-show-table')?.checked ?? true;
  const showForm  = document.getElementById('branch-show-form')?.checked ?? true;

  const newName = nameEl?.value.trim();
  const newIcon = iconEl?.value.trim() || '🏪';

  if (!newName) {
    nameEl?.focus();
    nameEl?.style.setProperty('border-color', '#dc2626');
    showToast('الاسم مطلوب', 'error');
    return;
  }

  try {
    await sb('PATCH', `/rest/v1/inv_columns?id=eq.${branchId}`, {
      display_name: newName,
      icon:         newIcon,
      is_branch:    isBranch,
      show_table:   showTable,
      show_form:    showForm
    });

    // تحديث الـ branches المحلية في الذاكرة
    const idx = branches.findIndex(b => b.id === branchId);
    if (idx !== -1) { branches[idx].display_name = newName; branches[idx].icon = newIcon; }
    const idx2 = _allBranchCols.findIndex(b => b.id === branchId);
    if (idx2 !== -1) {
      _allBranchCols[idx2].display_name = newName;
      _allBranchCols[idx2].icon = newIcon;
      _allBranchCols[idx2].is_branch = isBranch;
      _allBranchCols[idx2].show_table = showTable;
      _allBranchCols[idx2].show_form = showForm;
    }

    closeModal();
    showToast(`✅ تم تغيير الاسم إلى "${newName}"`, 'ok');
    gmtRenderBranchList();
  } catch(e) {
    showToast('خطأ: ' + e.message, 'error');
  }
}

async function gmtToggleBranchVisibility(branchId, currentVisible) {
  try {
    await sb('PATCH', `/rest/v1/inv_columns?id=eq.${branchId}`, { show_table: !currentVisible });
    const idx = _allBranchCols.findIndex(b => b.id === branchId);
    if (idx !== -1) _allBranchCols[idx].show_table = !currentVisible;
    showToast(`${!currentVisible ? '👁 تم إظهار' : '🙈 تم إخفاء'} الفرع من الجداول`, 'ok');
    gmtRenderBranchList();
  } catch(e) {
    showToast('خطأ: ' + e.message, 'error');
  }
}

  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div style="background:#fef3c7;border-radius:10px;padding:10px 12px;font-size:12px;color:#92400e;font-weight:700;">
        ⚠️ الكود الداخلي (key_name) لا يمكن تغييره بعد الإضافة — اختره بعناية
      </div>
      <div>
        <label style="font-size:12px;font-weight:800;color:#374151;display:block;margin-bottom:6px;">🔑 الكود الداخلي <span style="color:#dc2626;">*</span></label>
        <input id="new-branch-key" type="text" placeholder="مثال: homs2 أو damascus_center" dir="ltr"
          style="width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:monospace;font-size:13px;font-weight:700;outline:none;box-sizing:border-box;"
          oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')">
        <div style="font-size:10px;color:#6b7280;margin-top:3px;">أحرف إنجليزية صغيرة وأرقام وشرطة سفلية فقط</div>
      </div>
      <div>
        <label style="font-size:12px;font-weight:800;color:#374151;display:block;margin-bottom:6px;">🏪 الاسم العربي <span style="color:#dc2626;">*</span></label>
        <input id="new-branch-name" type="text" placeholder="مثال: حلب — الشعار"
          style="width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:'Cairo';font-size:14px;font-weight:700;outline:none;box-sizing:border-box;">
      </div>
      <div>
        <label style="font-size:12px;font-weight:800;color:#374151;display:block;margin-bottom:6px;">😊 الأيقونة</label>
        <input id="new-branch-icon" type="text" value="🏪" maxlength="4"
          style="width:70px;padding:10px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:20px;text-align:center;outline:none;">
      </div>

      <div style="background:#fef2f2;border-radius:10px;padding:10px 12px;font-size:11px;color:#dc2626;font-weight:700;line-height:1.7;">
        📋 بعد الإضافة يجب تشغيل هذا SQL في Supabase لإضافة عمود الكمية للمنتجات:<br>
        <code style="background:#fff;padding:4px 8px;border-radius:6px;display:block;margin-top:6px;direction:ltr;font-size:12px;">
          ALTER TABLE products ADD COLUMN IF NOT EXISTS {key} INTEGER DEFAULT 0;
        </code>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="closeModal()" style="background:#f3f4f6;color:#374151;border:none;padding:10px 18px;border-radius:10px;font-family:'Cairo';font-weight:700;cursor:pointer;">إلغاء</button>
      <button onclick="gmtSaveNewBranch()"
        style="background:#16a34a;color:white;border:none;padding:10px 22px;border-radius:10px;font-family:'Cairo';font-size:13px;font-weight:800;cursor:pointer;">
        ＋ إضافة نقطة البيع
      </button>
    </div>`;
  document.getElementById('modal').style.display = 'flex';
}

async function gmtSaveNewBranch() {
  const keyEl  = document.getElementById('new-branch-key');
  const nameEl = document.getElementById('new-branch-name');
  const iconEl = document.getElementById('new-branch-icon');

  const key  = keyEl?.value.trim();
  const name = nameEl?.value.trim();
  const icon = iconEl?.value.trim() || '🏪';

  if (!key) { keyEl?.focus(); showToast('الكود مطلوب', 'error'); return; }
  if (!/^[a-z0-9_]+$/.test(key)) { showToast('الكود: أحرف إنجليزية صغيرة وأرقام وشرطة سفلية فقط', 'error'); return; }
  if (!name) { nameEl?.focus(); showToast('الاسم العربي مطلوب', 'error'); return; }

  // تحقق من عدم التكرار
  if (_allBranchCols.find(b => b.key_name === key)) {
    showToast(`الكود "${key}" موجود مسبقاً — اختر كوداً مختلفاً`, 'error');
    return;
  }

  const maxOrder = Math.max(0, ..._allBranchCols.map(b => b.sort_order || 0));

  try {
    await sb('POST', '/rest/v1/inv_columns', {
      id:           key,
      key_name:     key,
      display_name: name,
      icon:         icon,
      is_branch:    true,
      col_type:     'number',
      show_table:   true,
      show_form:    true,
      include_in_total: true,
      is_required:  false,
      sort_order:   maxOrder + 1,
      options:      []
    });

    // تحديث الذاكرة المحلية
    const newBranch = { id: key, key_name: key, display_name: name, icon, is_branch: true, show_table: true, show_form: true, sort_order: maxOrder + 1 };
    _allBranchCols.push(newBranch);
    branches.push({ key_name: key, display_name: name, icon });

    closeModal();
    showToast(`✅ تمت إضافة "${name}" — لا تنسَ تشغيل SQL في Supabase`, 'ok');
    gmtRenderBranchList();
  } catch(e) {
    showToast('خطأ: ' + e.message, 'error');
  }
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}


</script>
<script src="gmt-tour.js"></script>
</body>
</html>
